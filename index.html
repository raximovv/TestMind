<title>TestMind · Shaxsiy xususiyatlar soʻrovnomasi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --lazur:#0F6E8C;      /* Registan tile teal */
    --lazur-deep:#0A4F66;
    --ink:#152730;        /* dark blue slate text */
    --paper:#F1F6F7;      /* cool paper background */
    --card:#FFFFFF;
    --line:#D7E2E4;
    --zar:#C08A2E;        /* ochre accent, used sparingly */
    --viol:#8A6BC1;       /* violet — disagree side of scale */
    --viol-soft:#DCD2EE;
    --lazur-soft:#A8CBD6;
    --muted:#5B7078;
    --display:'Bitter', Georgia, serif;
    --body:'Rubik', 'Segoe UI', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.55}
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}
  .masthead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:10px}
  .mark{font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:.2px;color:var(--lazur-deep)}
  .tag{font-size:13px;color:var(--muted)}
  .weave{height:6px;margin:0 0 26px;background:repeating-linear-gradient(135deg,var(--lazur) 0 7px,transparent 7px 14px);opacity:.55;border-radius:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 24px;margin-bottom:18px}
  h1{font-family:var(--display);font-weight:700;font-size:30px;line-height:1.2;margin:0 0 14px}
  h2{font-family:var(--display);font-weight:600;font-size:21px;margin:0 0 6px}
  p{margin:0 0 12px}
  .muted{color:var(--muted);font-size:14px}
  .field{margin:16px 0}
  .field label{display:block;font-weight:500;margin-bottom:6px}
  .field input{width:100%;max-width:340px;padding:11px 12px;font:inherit;border:1px solid var(--line);border-radius:9px;background:#FBFDFD;color:var(--ink)}
  .field input:focus-visible{outline:2px solid var(--lazur);outline-offset:1px}
  .btn{display:inline-block;border:0;border-radius:10px;padding:12px 22px;font:inherit;font-weight:600;cursor:pointer;background:var(--lazur);color:#fff}
  .btn:hover{background:var(--lazur-deep)}
  .btn:focus-visible{outline:3px solid var(--zar);outline-offset:2px}
  .btn[disabled]{background:#B8C9CE;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--lazur-deep);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--lazur)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
  .navr{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .sharebox{margin-bottom:16px;text-align:center}
  .shareimg{max-width:100%;height:auto;border:1px solid var(--line);border-radius:12px;margin-bottom:10px}
  .pcount{font-size:14px;color:var(--muted);white-space:nowrap}
  .ptrack{height:10px;background:#E2EBEC;border-radius:5px;overflow:hidden;margin:8px 0 6px}
  .pfill{height:100%;background:linear-gradient(90deg,var(--lazur),var(--zar));width:0%;transition:width .3s ease;border-radius:5px}
  .qhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:4px}
  .cheer{font-family:var(--display);font-weight:600;font-size:18px;margin:0;color:var(--lazur-deep)}
  .cheer.pop{animation:cheerpop .45s ease}
  @keyframes cheerpop{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}
  .partlbl{font-size:12.5px;margin:0 0 16px}
  .item{padding:18px 0;border-bottom:1px solid var(--line)}
  .item:last-of-type{border-bottom:0}
  .item.warn .qtext{color:#8A3B1F}
  .qtext{font-weight:500;margin-bottom:4px}
  .qnum{color:var(--lazur-deep);font-weight:600;margin-right:6px}
  .qhelp{font-size:13.5px;color:var(--muted);margin:0 0 10px}
  /* ---- 5-point circle scale: Qoʻshilmayman -> Qoʻshilaman ---- */
  .scale{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px}
  .slab{font-size:13px;line-height:1.25;color:var(--muted);flex:0 0 auto;max-width:104px}
  .slab.l{text-align:right}
  .slab.r{text-align:left}
  .dots{display:flex;align-items:center;gap:clamp(6px,2vw,12px)}
  .opt{position:relative;display:flex;align-items:center;justify-content:center;
       padding:5px;cursor:pointer;border-radius:50%;user-select:none;
       -webkit-tap-highlight-color:transparent}
  .opt input{position:absolute;opacity:0;pointer-events:none}
  .dot{display:block;border-radius:50%;background:transparent;border:2px solid var(--line);
       transition:background .15s ease,border-color .15s ease,transform .12s ease}
  .opt.s1 .dot,.opt.s5 .dot{width:clamp(38px,10.5vw,46px);height:clamp(38px,10.5vw,46px)}
  .opt.s2 .dot,.opt.s4 .dot{width:clamp(33px,9vw,39px);height:clamp(33px,9vw,39px)}
  .opt.s3 .dot{width:clamp(28px,7.5vw,32px);height:clamp(28px,7.5vw,32px)}
  /* resting ring colours: warm on the disagree side, teal on the agree side */
  .opt.s1 .dot,.opt.s2 .dot{border-color:var(--viol-soft)}
  .opt.s4 .dot,.opt.s5 .dot{border-color:var(--lazur-soft)}
  .opt.s3 .dot{border-color:var(--line)}
  .opt:hover .dot{transform:scale(1.08)}
  .opt.s1:hover .dot,.opt.s2:hover .dot{border-color:var(--viol)}
  .opt.s3:hover .dot{border-color:var(--muted)}
  .opt.s4:hover .dot,.opt.s5:hover .dot{border-color:var(--lazur)}
  /* selected = filled (shape change, not colour alone) */
  .opt.sel.s1 .dot,.opt.sel.s2 .dot{background:var(--viol);border-color:var(--viol)}
  .opt.sel.s3 .dot{background:var(--muted);border-color:var(--muted)}
  .opt.sel.s4 .dot,.opt.sel.s5 .dot{background:var(--lazur);border-color:var(--lazur)}
  .opt.sel .dot{box-shadow:0 0 0 3px rgba(15,110,140,.14)}
  .opt.sel.s1 .dot,.opt.sel.s2 .dot{box-shadow:0 0 0 3px rgba(138,107,193,.16)}
  .opt input:focus-visible + .dot{outline:3px solid var(--zar);outline-offset:2px}
  .item.warn .dot{border-color:#C79A3F}

    .scale{flex-wrap:wrap;gap:8px}
    .slab{max-width:none;font-size:12.5px}
    .slab.l{order:1;flex:1 1 40%;text-align:left}
    .slab.r{order:2;flex:1 1 40%;text-align:right}
    .dots{order:3;flex:1 1 100%;justify-content:space-between;gap:4px;margin-top:2px}

  .trait:last-of-type{border-bottom:0}

  .tname{font-family:var(--display);font-weight:600;font-size:18px}
  .tmeta{display:flex;align-items:center;gap:10px}
  .score{font-weight:600;color:var(--lazur-deep)}

  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
  .cval{font-weight:600;font-size:14px;color:var(--lazur-deep)}
  .vtrack{display:flex;flex-direction:column;gap:3px}

  .clab{font-size:12px;text-align:center;color:var(--muted);line-height:1.25;min-height:32px}
  .badge{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.4px;color:var(--zar);border:1px solid var(--zar);border-radius:99px;padding:3px 10px;margin-bottom:12px}
  .lede{font-size:17px;line-height:1.5;margin:0 0 16px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 22px;padding:0;list-style:none}

  .more{margin-top:20px;border-top:1px solid var(--line);padding-top:12px}
  .more summary{cursor:pointer;font-size:14px;font-weight:500;color:var(--lazur-deep);list-style:none}
  .more summary::-webkit-details-marker{display:none}
  .more summary::after{content:' ▼'}
  .more[open] summary::after{content:' ▲'}
  .more summary:focus-visible{outline:2px solid var(--zar);outline-offset:2px;border-radius:4px}
  .more p{font-size:13.5px;color:var(--muted);margin:10px 0 0}
  /* ---- result hero: the screenshot moment ---- */
  .hero{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:16px}
  .herotop{position:relative;background:var(--famsoft);padding:14px 16px 0;text-align:center}
  .herotop::after{content:'';position:absolute;left:0;right:0;bottom:0;height:6px;
                  background:repeating-linear-gradient(135deg,var(--fam) 0 7px,transparent 7px 14px);opacity:.5}
  .famtag{display:inline-block;font-size:11.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
          color:#fff;background:var(--fam);border-radius:99px;padding:4px 13px}
  .herotop svg{display:block;width:236px;max-width:68vw;height:auto;margin:2px auto 0}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .actions .btn{width:100%}
  .actions .wide{grid-column:1 / -1}
  .herobody{padding:20px 22px 22px;text-align:center}
  .archname{font-family:var(--display);font-weight:700;font-size:clamp(26px,7vw,34px);line-height:1.15;
            color:var(--fam);margin:0 0 4px}
  .archwho{font-size:13px;color:var(--muted);margin:0 0 14px}
  .archlines{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .archlines li{font-size:15.5px;line-height:1.5}
  .strength{margin:16px 0 0;padding:12px 14px;border-radius:11px;background:var(--famsoft);
            font-size:15px;line-height:1.45}
  .strength b{color:var(--fam)}
  .deep{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-bottom:16px}
  .deep>summary{cursor:pointer;font-weight:600;color:var(--lazur-deep);list-style:none}
  .deep>summary::-webkit-details-marker{display:none}
  .deep>summary::after{content:' ▼';font-weight:400;font-size:12px}
  .deep[open]>summary::after{content:' ▲'}
  .deep>summary:focus-visible{outline:2px solid var(--zar);outline-offset:3px;border-radius:4px}
  .foot{margin-top:30px;font-size:12.5px;color:var(--muted);text-align:center}
  .foot a{color:var(--zar)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
  @media print{
    body{background:#fff}
    .btn,.nav,.foot,.weave{display:none !important}
    .card{border:0;padding:0}
  }
</style>

// answers: array of values in 1..5 (0 = unanswered).
// Each item carries its own trait (d) and reverse flag (r), so questions can be
// added, removed or reordered without breaking the scoring.
function scoreAnswers(answers){
  var sums = {N:0,E:0,O:0,A:0,C:0}, counts = {N:0,E:0,O:0,A:0,C:0};
  for (var i = 0; i < ITEMS.length; i++){
    var v = answers[i];
    if (!v) continue;
    var it = ITEMS[i];
    if (it.r) v = 6 - v;
    sums[it.d] += v; counts[it.d]++;
  }
  function m(d){ return counts[d] ? sums[d]/counts[d] : 0; }
  // ES is inverted Neuroticism; with no N answers it must stay 0, not 6.
  return { ES: counts.N ? 6 - m('N') : 0, E: m('E'), O: m('O'), A: m('A'), C: m('C') };
}

// ---------- Local draft save (this device only; wrapped so a blocked/full
//            localStorage never breaks the test — it just runs without saving) ----------
var SAVE_KEY = 'testmind_draft_v1';
function saveDraft(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      name: state.name, age: state.age, answers: state.answers, page: state.page,
      aid: state.aid || '', ts: Date.now()
    }));
  } catch (e) {}
}
function clearDraft(){ try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function loadDraft(){
  try {
    var d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!d || !Array.isArray(d.answers) || d.answers.length !== ITEMS.length) return null;
    d.answers = d.answers.map(function(v){ v = parseInt(v, 10); return (v >= 1 && v <= 5) ? v : 0; });
    return d;
  } catch (e) { return null; }
}

}

function sendStats(status, s, arch){
  if (!SHEET_URL || statsSent) return;
  var answered = state.answers.filter(function(v){ return v > 0; }).length;
  if (!answered) return;                                   // nothing worth reporting
  if (status === 'abandoned'){ if (abandonSent) return; abandonSent = true; }
  if (status === 'completed') statsSent = true;

  var r1 = function(x){ return Math.round(x * 10) / 10; };
  var payload = {
    id: anonId(), status: status, age: state.age,
    answered: answered, total: ITEMS.length,
    durationSec: sessionStart ? Math.round((Date.now() - sessionStart) / 1000) : '',
    device: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
    v: TM_VERSION
  };
  if (s){ payload.ES = r1(s.ES); payload.E = r1(s.E); payload.O = r1(s.O); payload.A = r1(s.A); payload.C = r1(s.C); }
  if (arch) payload.archetype = arch.name;

  // Fire-and-forget. Wrapped so a failed request can NEVER block the result screen.
  try {
    var body = JSON.stringify(payload);
    if (status === 'abandoned' && navigator.sendBeacon){
      navigator.sendBeacon(SHEET_URL, new Blob([body], {type:'text/plain;charset=UTF-8'}));
    } else {
      fetch(SHEET_URL, {
        method: 'POST', mode: 'no-cors', keepalive: true,
        headers: {'Content-Type':'text/plain;charset=UTF-8'}, body: body
      })['catch'](function(){});
    }
  } catch (e) {}
}

// Capture drop-off: report an unfinished attempt when the page is closed/hidden.
window.addEventListener('pagehide', function(){ sendStats('abandoned'); });
document.addEventListener('visibilitychange', function(){
  if (document.visibilityState === 'hidden') sendStats('abandoned');
});

function renderStart(){
  app.innerHTML =
    '<div class="card">' +
      '<span class="badge">SINOV VERSIYASI</span>' +
      '<h1>Shaxsiy xususiyatlar soʻrovnomasi</h1>' +
      '<p class="lede">Qanchalik kirishimli, ijodkor va masʼuliyatli ekaningizni bilib oling.</p>' +
      '<ul class="meta">' +
        '<li>50 savol</li><li>~7 daqiqa</li><li>Anonim</li>' +
      '</ul>' +
      '<div class="field"><label for="f-name">Ismingiz</label><input id="f-name" type="text" autocomplete="off"></div>' +
      '<div class="field"><label for="f-age">Yoshingiz</label><input id="f-age" type="number" min="10" max="99" inputmode="numeric"></div>' +
      '<button class="btn" id="startBtn">Boshlash</button>' +
      '<p class="muted" id="startMsg" style="margin-top:10px"></p>' +
    '</div>';
  document.getElementById('startBtn').onclick = function(){
    var n = document.getElementById('f-name').value.trim();
    var a = document.getElementById('f-age').value.trim();
    if (!n || !a){ document.getElementById('startMsg').textContent = 'Ism va yoshni kiriting.'; return; }
    state.name = n; state.age = a; state.page = 0;
    saveDraft();
    renderPage();
  };
}

function answeredOnPage(p){
  var from = p * PAGE_SIZE, to = Math.min(from + PAGE_SIZE, ITEMS.length), c = 0;
  for (var i = from; i < to; i++) if (state.answers[i]) c++;
  return { done: c, total: to - from };
}

function renderPage(){
  var p = state.page;
  saveDraft();
  var from = p * PAGE_SIZE, to = Math.min(from + PAGE_SIZE, ITEMS.length);
  var answeredTotal = state.answers.filter(function(v){ return v > 0; }).length;
  if (!sessionStart){ sessionStart = Date.now(); sessionStartAnswered = answeredTotal; }
  // Was this page already finished when it opened? If so we must NOT auto-advance —
  // otherwise editing an answer on a completed page would yank the page away.
  var pageWasComplete = answeredOnPage(p).done === answeredOnPage(p).total;
  var html =
    '<div class="qhead">' +
      '<h2 class="cheer" id="cheer">' + cheerText(answeredTotal) + '</h2>' +
      '<span class="pcount" id="pageCount">' + answeredTotal + ' / ' + ITEMS.length + '</span>' +
    '</div>' +
    '<div class="ptrack"><div class="pfill" id="pfill" style="width:' + Math.round(answeredTotal / ITEMS.length * 100) + '%"></div></div>' +
    '<div class="partlbl muted" id="partlbl" data-base="Savollar ' + (from+1) + '–' + to + '">' +
      'Savollar ' + (from+1) + '–' + to + timeLeftText() + '</div>' +
    '<div class="card">';
  for (var i = from; i < to; i++){
    var it = ITEMS[i];
    html += '<div class="item" id="item-' + i + '">' +
      '<div class="qtext"><span class="qnum">' + (i+1) + '.</span>' + esc(it.t) + '</div>' +
      (it.h ? '<p class="qhelp">' + esc(it.h) + '</p>' : '') +
      '<div class="scale" role="radiogroup" aria-label="' + (i+1) + '-savol">' +
        '<span class="slab l" aria-hidden="true">' + LABELS[0] + '</span>' +
        '<div class="dots">';
    for (var v = 1; v <= 5; v++){
      var sel = state.answers[i] === v ? ' sel' : '';
      html += '<label class="opt s' + v + sel + '" title="' + LABELS[v-1] + '">' +
              '<input type="radio" name="q' + i + '" value="' + v + '" aria-label="' + LABELS[v-1] + '"' +
              (state.answers[i] === v ? ' checked' : '') + '><span class="dot"></span></label>';
    }
    html += '</div><span class="slab r" aria-hidden="true">' + LABELS[4] + '</span></div></div>';
  }
  html += '</div>' +
    '<div class="nav">' +
      (p > 0 ? '<button class="btn ghost" id="prevBtn">Orqaga</button>' : '<span></span>') +
      '<button class="btn" id="nextBtn">' + (p === PAGES-1 ? 'Natijani koʻrish' : 'Keyingi') + '</button>' +
    '</div>';
  app.innerHTML = html;
  window.scrollTo({top:0, behavior:'auto'});

  updateCount();

  // Repaint one item from state (0 = unanswered, so nothing is highlighted).
  function paintItem(idx){
    var itemEl = document.getElementById('item-' + idx);
    if (!itemEl) return;
    itemEl.classList.remove('warn');
    var labels = itemEl.querySelectorAll('.opt');
    for (var k = 0; k < labels.length; k++) labels[k].classList.remove('sel');
    var v = state.answers[idx];
    if (v){
      var chosen = itemEl.querySelector('.opt.s' + v);
      if (chosen) chosen.classList.add('sel');
    }
  }

  // Gentle auto-advance: only the first time this page becomes complete, and
  // never on the last page (seeing the result should be a deliberate tap).
  function tryAutoAdvance(){
    if (pageWasComplete || p >= PAGES - 1) return;
    var ap = answeredOnPage(p);
    if (ap.done === ap.total){
      pageWasComplete = true;
      setTimeout(function(){
        if (state.page === p){ state.page = p + 1; renderPage(); }
      }, 450);
    }
  }

  function applyAnswer(idx, val, mayAdvance){
    state.answers[idx] = val;
    paintItem(idx);
    updateCount();
    saveDraft();
    if (val && mayAdvance) tryAutoAdvance();
  }

  var radios = app.querySelectorAll('input[type=radio]');
  for (var r = 0; r < radios.length; r++){
    // Pointer taps. Tapping the circle that is already chosen CLEARS the answer.
    // (A checked radio fires 'click' but never 'change', so this must live here.)
    radios[r].onclick = function(){
      var idx = parseInt(this.name.slice(1), 10);
      var val = parseInt(this.value, 10);
      if (state.answers[idx] === val){
        this.checked = false;
        applyAnswer(idx, 0, false);      // cleared -> must not auto-advance
      } else {
        applyAnswer(idx, val, true);
      }
    };
    // Keyboard arrow-key navigation fires 'change' without 'click'.
    radios[r].onchange = function(){
      var idx = parseInt(this.name.slice(1), 10);
      var val = parseInt(this.value, 10);
      if (state.answers[idx] !== val) applyAnswer(idx, val, true);
    };
  }
  if (p > 0) document.getElementById('prevBtn').onclick = function(){ state.page--; renderPage(); };
  document.getElementById('nextBtn').onclick = function(){
    var a = answeredOnPage(p);
    if (a.done < a.total){
      for (var i = from; i < to; i++){
        if (!state.answers[i]){ document.getElementById('item-' + i).classList.add('warn'); }
      }
      var first = app.querySelector('.item.warn');
      if (first) first.scrollIntoView({behavior:'smooth', block:'center'});
      updateCount(true);
      return;
    }
    if (p === PAGES - 1) renderReport(); else { state.page++; renderPage(); }
  };
}

// Encouraging heading that changes as the overall progress crosses milestones.
function cheerText(answered){
  var total = ITEMS.length;
  if (answered <= 0) return 'Boshladik 💫';
  if (answered >= total) return 'Profilingiz tayyor 🎯';
  var pct = answered / total;
  if (pct >= 0.75) return 'Deyarli marradamiz 🚀';
  if (pct >= 0.5)  return 'Shaxsingizning yarmi ochildi 🔓';
  if (pct >= 0.25) return 'Miyangizni tahlil qilyapmiz 🧠';
  return 'Yaxshi boshlandi 👌';
}

// Live time estimate from the user's own pace in THIS session (so a resumed
// draft doesn't count the hours they were away). Hidden until the pace is stable.
var sessionStart = 0, sessionStartAnswered = 0;
function timeLeftText(){
  var answered = state.answers.filter(function(v){ return v > 0; }).length;
  var doneNow = answered - sessionStartAnswered;
  if (!sessionStart || doneNow < 5) return '';
  var left = (ITEMS.length - answered) * ((Date.now() - sessionStart) / doneNow);
  if (left <= 0) return '';
  var mins = Math.round(left / 60000);
  return ' · ' + (mins <= 1 ? 'oz qoldi' : '~' + mins + ' daqiqa qoldi');
}

function updateCount(missing){
  var answered = state.answers.filter(function(v){ return v > 0; }).length;
  var fill = document.getElementById('pfill');
  if (fill) fill.style.width = Math.round(answered / ITEMS.length * 100) + '%';
  var cheer = document.getElementById('cheer');
  if (cheer){
    var t = cheerText(answered);
    if (cheer.textContent !== t){        // milestone reached -> update + little pop
      cheer.textContent = t;
      cheer.classList.remove('pop'); void cheer.offsetWidth; cheer.classList.add('pop');
    }
  }
  var el = document.getElementById('pageCount');
  if (el){
    var a = answeredOnPage(state.page);
    el.textContent = answered + ' / ' + ITEMS.length + (missing && a.done < a.total ? ' · qolgan savollarga javob bering' : '');
  }
  var pl = document.getElementById('partlbl');
  if (pl) pl.textContent = pl.getAttribute('data-base') + timeLeftText();
}

function vbarHtml(mean){
  var on = Math.round(mean * 3), h = '<div class="vtrack" aria-hidden="true">';
  for (var i = 15; i >= 1; i--) h += '<span class="vseg' + (i <= on ? ' on' : '') + '"></span>';
  return h + '</div>';
}
function boardHtml(s){
  var h = '<div class="board">';
  ['ES','E','O','A','C'].forEach(function(k){
    h += '<div class="col"><span class="cval">' + (Math.round(s[k]*10)/10).toFixed(1) + '</span>' +
         vbarHtml(s[k]) +
         '<span class="clab">' + TRAITS[k] + '</span></div>';
  });
  return h + '</div>';
}

// ---------- Shareable result image (1080x1350, drawn locally, no server) ----------
function wrapText(g, text, x, y, maxW, lineH, maxLines){
  var words = String(text).split(' '), line = '', lines = [];
  for (var i = 0; i < words.length; i++){
    var test = line ? line + ' ' + words[i] : words[i];
    if (g.measureText(test).width > maxW && line){ lines.push(line); line = words[i]; }
    else line = test;
  }
  if (line) lines.push(line);
  if (maxLines) lines = lines.slice(0, maxLines);
  for (var j = 0; j < lines.length; j++) g.fillText(lines[j], x, y + j * lineH);
  return y + lines.length * lineH;
}

// Portrait card for Telegram/Instagram. The character is rasterised from the same
// inline SVG the page uses, via a data: URI — no network request, so the canvas
// stays untainted and toBlob() keeps working. If it ever fails to decode we still
// return a usable card without the figure rather than no card at all.
function buildShareCard(s, arch, key, cb){
  var W = 1080, H = 1350, M = 80;
  var fam = FAMILIES[arch.fam];
  var c = document.createElement('canvas'); c.width = W; c.height = H;
  var g = c.getContext('2d');

  g.fillStyle = '#FFFFFF'; g.fillRect(0, 0, W, H);
  g.fillStyle = fam.soft;  g.fillRect(0, 0, W, 716);
  g.fillStyle = fam.c;     g.fillRect(0, 708, W, 8);
  g.textBaseline = 'alphabetic';

  g.textAlign = 'left';
  g.fillStyle = fam.c; g.font = '700 46px Bitter, Georgia, serif';
  g.fillText('TestMind', M, 96);
  g.textAlign = 'right';
  g.fillStyle = '#5B7078'; g.font = '500 30px Rubik, "Segoe UI", sans-serif';
  g.fillText(fam.name, W - M, 96);

  function finish(){
    g.textAlign = 'center';
    g.fillStyle = fam.c; g.font = '700 74px Bitter, Georgia, serif';
    var y = wrapText(g, arch.name, W / 2, 806, W - M * 2, 84, 2);

    g.fillStyle = '#5B7078'; g.font = '400 29px Rubik, "Segoe UI", sans-serif';
    g.fillText(state.name + ' · ' + state.age + ' yosh', W / 2, y + 20);

    g.fillStyle = '#152730'; g.font = '400 34px Rubik, "Segoe UI", sans-serif';
    y = wrapText(g, arch.lines[0], W / 2, y + 84, W - M * 2, 48, 3);

    // Sit the strength box low enough to fill the card, but always clear of the text.
    var boxTop = Math.min(Math.max(y + 40, 1046), 1168);
    g.fillStyle = fam.soft; g.fillRect(M, boxTop, W - M * 2, 122);
    g.fillStyle = fam.c; g.font = '600 30px Rubik, "Segoe UI", sans-serif';
    g.fillText('KUCHLI TOMONIM', W / 2, boxTop + 46);
    g.fillStyle = '#152730'; g.font = '500 33px Rubik, "Segoe UI", sans-serif';
    var str = arch.strength.charAt(0).toUpperCase() + arch.strength.slice(1);
    wrapText(g, str, W / 2, boxTop + 92, W - M * 2 - 60, 42, 1);

    g.fillStyle = '#5B7078'; g.font = '400 27px Rubik, "Segoe UI", sans-serif';
    g.fillText('testmind-minis.netlify.app', W / 2, H - 48);
    cb(c);
  }

  var img = new Image();
  img.onload = function(){ g.drawImage(img, (W - 432) / 2, 140, 432, 540); finish(); };
  img.onerror = finish;
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(charSvg(key));
}

function renderReport(){
  clearDraft(); // test finished — remove the saved answers from this device
  var s = scoreAnswers(state.answers);
  var arch = archetypeOf(s);
  sendStats('completed', s, arch);
  var today = new Date();
  var dateStr = ('0'+today.getDate()).slice(-2) + '.' + ('0'+(today.getMonth()+1)).slice(-2) + '.' + today.getFullYear();
  var fam = FAMILIES[arch.fam];
  var archKey = archetypeKeyOf(s);

  // The hero comes first and carries no numbers: a teenager should see who they are
  // before they see any score. The five scores live one tap away, under «Batafsil».
  var html =
    '<div class="hero" style="--fam:' + fam.c + ';--famsoft:' + fam.soft + '">' +
      '<div class="herotop">' +
        '<span class="famtag">' + fam.name + '</span>' +
        charSvg(archKey, arch.name) +
      '</div>' +
      '<div class="herobody">' +
        '<h1 class="archname">' + arch.name + '</h1>' +
        '<p class="archwho">' + esc(state.name) + ' · ' + esc(state.age) + ' yosh · ' + dateStr + '</p>' +
        '<ul class="archlines">' +
          arch.lines.map(function(l){ return '<li>' + l + '</li>'; }).join('') +
        '</ul>' +
        '<p class="strength"><b>Kuchli tomoningiz:</b> ' + arch.strength + '</p>' +
      '</div>' +
    '</div>' +
    '<div class="actions">' +
      '<button class="btn wide" id="shareBtn">Rasm qilib saqlash</button>' +
      '<button class="btn ghost" id="printBtn">Chop etish</button>' +
      '<button class="btn ghost" id="againBtn">Qaytadan</button>' +
    '</div>' +
    '<div id="shareBox" class="sharebox"></div>' +
    '<details class="deep"><summary>Batafsil natija — 5 ta xususiyat</summary><div>' +
      boardHtml(s);
  ['ES','E','O','A','C'].forEach(function(k){
    var mean = s[k], lvl = levelOf(mean);
    html += '<div class="trait">' +
      '<div class="trow"><span class="tname">' + TRAITS[k] + '</span>' +
      '<span class="tmeta"><span class="score">' + (Math.round(mean*10)/10).toFixed(1) + ' / 5</span>' +
      '<span class="chip' + (lvl === 'Yuqori' ? ' hi' : '') + '">' + lvl + '</span></span></div>' +
      '<p>' + TEXTS[k][textKey(lvl)] + '</p>' +
      '</div>';
  });
  html += '<p class="muted" style="margin-top:16px">' + DISCLAIMER + '</p>' +
      '<p class="muted" style="margin-top:8px">Javoblaringiz shu qurilmadan oʻchirildi.</p>' +
    '</div></details>' +
    // Short form stays visible: the full disclaimer must not be hidden behind a toggle.
    '<p class="muted" style="text-align:center;margin:0">Natija maslahat xarakteriga ega — hukm emas.</p>';
  app.innerHTML = html;
  window.scrollTo({top:0, behavior:'auto'});
  document.getElementById('againBtn').onclick = function(){
    clearDraft();
    state = { name:'', age:'', answers:new Array(ITEMS.length).fill(0), page:0 };
    statsSent = false; abandonSent = false;   // a new attempt gets its own row + new id
    renderStart();
  };
  document.getElementById('printBtn').onclick = function(){
    // A closed <details> prints empty, so open the full breakdown before printing.
    var d = document.querySelector('details.deep'); if (d) d.open = true;
    window.print();
  };
  document.getElementById('shareBtn').onclick = function(){
    var btn = this, box = document.getElementById('shareBox');
    btn.disabled = true; btn.textContent = 'Tayyorlanmoqda…';
    function show(url){
      btn.disabled = false; btn.textContent = 'Rasm qilib saqlash';
      box.innerHTML =
        '<img class="shareimg" src="' + url + '" alt="TestMind natija kartasi">' +
        '<p class="muted">Telefonda saqlash uchun rasmni bosib turing, yoki tugmani bosing.</p>' +
        '<a class="btn" download="testmind-natija.png" href="' + url + '">Yuklab olish</a>';
      box.scrollIntoView({behavior:'smooth', block:'nearest'});
    }
    buildShareCard(s, arch, archKey, function(canvas){
      if (canvas.toBlob) canvas.toBlob(function(b){ show(URL.createObjectURL(b)); }, 'image/png');
      else show(canvas.toDataURL('image/png'));
    });
  };
}

// Offer to continue an unfinished test found on this device.
function renderResume(d){
  var answered = d.answers.filter(function(v){ return v > 0; }).length;
  app.innerHTML =
    '<div class="card">' +
      '<h1>Yarim qolgan test</h1>' +
      '<p>Bu qurilmada tugallanmagan test topildi. Davom ettirasizmi?</p>' +
      '<p class="muted">' + esc(d.name) + ' · ' + answered + ' / ' + ITEMS.length + ' savolga javob berilgan.</p>' +
      '<div class="nav" style="margin-top:18px">' +
        '<button class="btn ghost" id="freshBtn">Yangidan boshlash</button>' +
        '<button class="btn" id="resumeBtn">Davom etish</button>' +
      '</div>' +
    '</div>';
  document.getElementById('resumeBtn').onclick = function(){
    state.name = d.name; state.age = d.age;
    state.answers = d.answers.slice();
    state.page = Math.min(d.page || 0, PAGES - 1);
    state.aid = d.aid || '';          // keep one id across abandon -> resume -> finish
    renderPage();
  };
  document.getElementById('freshBtn').onclick = function(){
    clearDraft();
    state = { name:'', age:'', answers:new Array(ITEMS.length).fill(0), page:0 };
    statsSent = false; abandonSent = false;   // a new attempt gets its own row + new id
    renderStart();
  };
}

function boot(){
  var d = loadDraft();
  if (d && d.name && d.answers.some(function(v){ return v > 0; })) renderResume(d);
  else renderStart();
}

boot();
</script>
